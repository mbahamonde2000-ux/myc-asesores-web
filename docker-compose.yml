services:
  mysql:
    image: mysql:8.0
    container_name: myc_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: myc_db
      MYSQL_USER: myc_user
      MYSQL_PASSWORD: myc_pass
    ports:
      - "3307:3306"
    volumes:
      - myc_mysql_data:/var/lib/mysql

volumes:
  myc_mysql_data: